# ssl configuration
ssl_dhparam         dhparams.pem;
ssl_session_cache   shared:SSL:1m;
ssl_session_timeout 5m;

include nginx_ssl_protocol.conf;
include nginx_ssl_ciphersuite.conf;
include nginx_ssl_verify_client.conf;
include nginx_https_customization.conf;

location ~ /\. {
    return 404;
}

location ~ /bmc/tmpshare/data {
    deny all;
}

location ~ /bmc/tmpshare/bmc {
    deny all;
}

location ~ /bmc/tmpshare/shm {
    deny all;
}

location ~ /bmc/tmpshare/tmp {
    deny all;
}

location ~* (\.htaccess$|\.htpasswd$|~$|\.bak$|\.BAK$|\.tmp|\.keystore$) { 
    deny all;
}

# error configuration
error_page 400 401 403 405 406 407 413 414 /40x.html;
location = /40x.html {
    internal;
    root /opt/bmc/web/htdocs/error_page;
}

error_page 500 501 502 503 /50x.html;
location = /50x.html {
    internal;
    root /opt/bmc/web/htdocs/error_page;
}

error_page 404 /404.html;
location = /404.html {
    internal;
    root /opt/bmc/web/htdocs/error_page;
}

if ($request_method !~ ^(GET|POST|PATCH|DELETE|PUT)$) {
    return 403;
}

# 确保每个IP地址的连接数受到限制
limit_conn limitperip 128;

rewrite ^/UI/Static/(.*)$ /$1 last; 
# 直连kvm的url映射到首页
rewrite ^/remoteconsole(.*) /index.html last;
rewrite ^/kvmvmm.asp(.*) /index.html last;
rewrite ^/login.html(.*) /index.html last;

# url访问kvm的映射
rewrite ^/remote_access.asp(.*) https://$http_host/UI/Rest/KVMHandler permanent;

# 独立kvm、直连kvm认证的url映射
location = /bmc/php/processparameter.php {
    return 307 https://$host:$server_port/UI/Rest/KVMHandler;
}
location  ^~/sso {
    rewrite /sso /UI/Rest/SSOHandler last;
}

location = /uploadfile_filesize_out_range.json {
    internal;
    root /opt/bmc/web/htdocs/error_page;
}

location ~* ^/redfish {
    error_page 413 /uploadfile_insufficient_space.json;

    # Redfish不支持PUT方法
    if ($request_method ~ ^(PUT)$) {
        return 403;
    }
    
    location ~* ^/redfish/v1/UpdateService/FirmwareInventory/Memory$ {
        internal;
        client_max_body_size      1m;
        error_page 413 /uploadfile_filesize_out_range.json;
        error_page 500 502 503 =400 /uploadfile_error.json;

        proxy_set_header X-Server-IP $server_addr;
        proxy_set_header X-Server-Port $server_port;
        proxy_set_header X-Verify-Enabled $ssl_verify_enabled;
        proxy_http_version 1.1;
        proxy_pass http://redfish_proxy;
    }

    location ~* ^/redfish/v1/UpdateService/FirmwareInventory$ {
        if ($http_encryptedupload = true) {
            rewrite (.*) $1/Memory last;
        }

        proxy_set_header X-Server-IP $server_addr;
        proxy_set_header X-Server-Port $server_port;
        proxy_set_header X-Verify-Enabled $ssl_verify_enabled;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_pass http://redfish_proxy;
    }

    location ~* ^/redfish/v1/DataAcquisitionService/DataAcquisitionReport {
        proxy_read_timeout        180m;
        proxy_connect_timeout     180m;
        proxy_send_timeout        180m;

        proxy_set_header X-Server-IP $server_addr;
        proxy_set_header X-Server-Port $server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Real-Port $remote_port;
        proxy_set_header X-Verify-Enabled $ssl_verify_enabled;
        proxy_http_version 1.1;
        proxy_pass http://redfish_proxy;
    }

    proxy_set_header X-Server-IP $server_addr;
    proxy_set_header X-Server-Port $server_port;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Real-Port $remote_port;
    proxy_set_header X-Verify-Enabled $ssl_verify_enabled;
    proxy_http_version 1.1;
    proxy_pass http://redfish_proxy;
}

location = /url_notfound.json {
    internal;
    root /opt/bmc/web/htdocs/error_page;
}

location = /webrest_uploadfile_filesize_out_range.json {
    internal;
    root /opt/bmc/web/htdocs/error_page;
}

location ~* ^/UI/Rest {
    proxy_intercept_errors on;
    error_page 405 =404 /url_notfound.json;

    location ~* ^/UI/Rest/AccessMgnt/Kerberos/ImportKeyTab$ {
        client_max_body_size      1m;
        error_page 413 /webrest_uploadfile_filesize_out_range.json;
   
        proxy_set_header X-Server-IP $server_addr;
        proxy_set_header X-Server-Port $server_port;
        proxy_http_version 1.1;
        proxy_pass http://web_backend_proxy;
    }

    location ~* ^/UI/Rest/FirmwareInventory$ {
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_pass http://web_backend_proxy;
    }

    location ~* ^/UI/Rest/KeepAlive {
        proxy_ignore_client_abort  on;

        proxy_set_header X-Server-IP $server_addr;
        proxy_set_header X-Server-Port $server_port;
        proxy_http_version 1.1;
        proxy_pass http://web_backend_proxy;
    }

    # Key直连依赖unsafe-inline选项，重新add_header以覆盖nginx.conf的配置
    location ~* ^/UI/Rest/KVMHandler$ {
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src 'self' wss://*:*; img-src 'self' data:; frame-src 'self'; font-src 'self' data:; object-src 'self'; style-src 'self'; form-action 'self'; frame-ancestors 'self'; plugin-types 'none'";
        proxy_set_header X-Server-IP $server_addr;
        proxy_set_header X-Server-Port $server_port;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header User_Agent $http_user_agent;
        proxy_set_header X-SSL_Client_serial $ssl_client_serial;
        proxy_set_header X-SSL-Client-subject $ssl_client_s_dn;
        proxy_set_header X-SSL-Client-issuer $ssl_client_i_dn;
        proxy_http_version 1.1;
        proxy_pass http://web_backend_proxy;
    }

    # SSO直连依赖unsafe-inline选项，重新add_header以覆盖nginx.conf的配置
    location ~* ^/UI/Rest/SSOHandler$ {
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src 'self' wss://*:*; img-src 'self' data:; frame-src 'self'; font-src 'self' data:; object-src 'self'; style-src 'self'; form-action 'self'; frame-ancestors 'self'; plugin-types 'none'";
        proxy_set_header X-Server-IP $server_addr;
        proxy_set_header X-Server-Port $server_port;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header User_Agent $http_user_agent;
        proxy_set_header X-SSL_Client_serial $ssl_client_serial;
        proxy_set_header X-SSL-Client-subject $ssl_client_s_dn;
        proxy_set_header X-SSL-Client-issuer $ssl_client_i_dn;
        proxy_http_version 1.1;
        proxy_pass http://web_backend_proxy;
    }

    proxy_set_header X-Server-IP $server_addr;
    proxy_set_header X-Server-Port $server_port;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header User_Agent $http_user_agent;
    proxy_set_header X-SSL_Client_serial $ssl_client_serial;
    proxy_set_header X-SSL-Client-subject $ssl_client_s_dn;
    proxy_set_header X-SSL-Client-issuer $ssl_client_i_dn;
    proxy_http_version 1.1;
    proxy_pass http://web_backend_proxy;
}

location = /uploadfile_unauth.json {
    internal;
    root /opt/bmc/web/htdocs/error_page;
}

location = /uploadfile_insufficient_space.json {
    internal;
    root /opt/bmc/web/htdocs/error_page;
}

location = /uploadfile_error.json {
    internal;
    root /opt/bmc/web/htdocs/error_page;
}

location = /download_static_file {
    internal;
    proxy_set_header X-Server-IP $server_addr;
    proxy_set_header X-Server-Port $server_port;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Real-Port $remote_port;
    proxy_set_header X-Real-Url $request_uri;
    proxy_http_version 1.1;
    proxy_pass http://web_backend_proxy/UI/Rest/AuthImg;
}

location ~* /tmp/web/.+\.jpeg$ {
    error_page 404 /404.html;
    error_page 500 =401 /40x.html;
    auth_request /download_static_file;
    root  /;
}

location = /auth_static_jar {
    internal;
    proxy_set_header X-Server-IP $server_addr;
    proxy_set_header X-Server-Port $server_port;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Real-Port $remote_port;
    proxy_set_header X-Real-Url $request_uri;
    proxy_http_version 1.1;
    proxy_pass http://web_backend_proxy/UI/Rest/AuthJar;
}

#jar访问需要鉴权
location ~* /bmc/pages/jar/.+\.jar$ {
    error_page 404 /404.html;
    error_page 500 =401 /40x.html;
    auth_request /auth_static_jar;
    root   /opt/bmc/web/htdocs;
}

#白名单访问无需鉴权
location ~* (^/help/.*.png$|productLogo.png$|login.jpg$|logo-irm.png$|login-irm.jpg$|helpdoc_zh.png$|helpdoc_en.png$|code.png$|language_icn_navigation.png$|error.png$|/assets/image/home/default/header_logo.png|/assets/image/home/standard/password.png|/assets/image/home/beautiful/password.png|/assets/image/home/standard/icon-user.png|/assets/image/home/beautiful/icon-user.png|/assets/image/loading1.gif|icon_help.png$|menu.png$|/assets/i18n/en-US/|en-US.json$|/assets/i18n/fr-FR/|fr-FR.json$|/assets/i18n/ja-JA/|ja-JA.json$|/assets/i18n/ru-RU/|ru-RU.json$|/assets/i18n/zh-CN/|zh-CN.json$|style_config.json$|/assets/scss/|/assets/image/icons|login_logo.png$|login.png$|/assets/image/help.png|code1.png|/extern/custom|bmc_help_0005.html$|bmc_help_0046.html$|irm_help_0004.html$|note_3.0-zh-cn.png$|zh-cn_image_0298342302.jpg$|zh-cn_image_0000001134305360.jpg$|note_3.0-en-us.png$|en-us_image_0298342302.jpg$|en-us_image_0000001180816393.jpg$|note_3.0-fr-fr.png$|fr-fr_image_0000001073611276.jpg$|fr-fr_image_0000001181827857.jpg$|note_3.0-ja-jp.png$|ja-jp_image_0298342302.jpg$|note_3.0-ru-ru.png$|ru-ru_image_0298342302.jpg$|icomoon.eot$|icomoon.svg$|icomoon.ttf$|icomoon.woff$|/index.html|/favicon.ico|\.js$|\.css$|\.scss$|^/image/ibmc.png$|^/assets/language.*.woff$|^/assets/language.*.ttf$|^/image/qrCode.png$) {
    root   /opt/bmc/web/htdocs;
    gunzip on;
    gzip_static on;
    gzip_proxied expired no-cache no-store private auth;
}

location = /auth_static_resources {
    internal;
    proxy_set_header X-Server-IP $server_addr;
    proxy_set_header X-Server-Port $server_port;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Real-Port $remote_port;
    proxy_set_header Content-Length 0;
    proxy_set_header Content-Type 'application/json;charset=utf-8';
    proxy_pass_request_body off;
    proxy_http_version 1.1;
    proxy_pass http://web_backend_proxy/UI/Rest/auth_static_resources;
}

#白名单之外，非/的url都需要鉴权
location ~* /.+ {
    error_page 404 /404.html;
    error_page 500 =401 /40x.html;
    auth_request /auth_static_resources;
    root   /opt/bmc/web/htdocs;
    gunzip on;
    gzip_static on;
    gzip_proxied expired no-cache no-store private auth;
}

location / {
    root   /opt/bmc/web/htdocs;
    index  index.html index.htm;
}
